services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: netsec_api

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - prediction_output:/app/prediction_output
      - artifacts:/app/Artifacts
      - logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.ui

    container_name: netsec_streamlit

    restart: unless-stopped

    ports:
      - "8501:8501"

    environment:
      API_BASE_URL: http://api:8000

    depends_on:
      api:
        condition: service_healthy

volumes:
  prediction_output:
  artifacts:
  logs: