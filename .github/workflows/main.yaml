name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  # ── 1. CI ─────────────────────────────────────────────
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check . --select E,F --ignore E501

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short || echo "No unit tests yet"

      - name: Build Docker image (API)
        run: docker build -f Dockerfile.api -t netsec-api .

  # ── 2. CD ─────────────────────────────────────────────
  deploy:
    name: Continuous Deployment
    needs: integration
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Deploy API to Render
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Deploy UI to Render
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_UI }}"

      - name: Wait for API health check
        run: |
          echo "Waiting for API health check..."

          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")

            if [ "$STATUS" = "200" ]; then
              echo "API is live!"
              exit 0
            fi

            echo "Attempt $i/12 — status $STATUS"
            sleep 15
          done

          echo "API did not become healthy in time"
          exit 1